<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art Gallery</title>
<style>
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --accent:  #7c6af7;
    --text:    #e2e4ef;
    --muted:   #6b7094;
    --tag-bg:  #252838;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  #updated  { margin-left: auto; color: var(--muted); font-size: 12px; }
  #api-btn  {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer;
  }
  #api-btn.on { border-color: var(--accent); color: var(--accent); }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Task cards */
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 16px; overflow: hidden;
  }
  .task-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .task-label { font-size: 14px; font-weight: 500; }
  .badge {
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    background: var(--tag-bg); color: var(--muted); text-transform: uppercase;
  }
  .badge.image { color: #81c784; }
  .badge.video { color: #64b5f6; }
  .task-id  { color: var(--muted); font-size: 11px; font-family: monospace; }
  .task-time { margin-left: auto; color: var(--muted); font-size: 11px; }

  /* Media grid */
  .media-grid {
    display: flex; gap: 12px; padding: 14px;
    flex-wrap: wrap; align-items: flex-start;
  }
  .media-item { position: relative; }
  .media-item img,
  .media-item video {
    display: block; border-radius: 6px;
    background: var(--tag-bg); border: 1px solid var(--border);
    max-height: 240px; max-width: 240px;
    object-fit: contain; cursor: pointer;
  }
  .media-item video:hover { border-color: var(--accent); }
  .media-index {
    position: absolute; top: 5px; left: 5px;
    background: rgba(0,0,0,.6); color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
  }

  /* Modal overlay for lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 100; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img, .lightbox video { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .lightbox-close { position: fixed; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; }

  /* API modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 400px; max-width: 90vw; }
  .modal h3 { font-size: 14px; margin-bottom: 8px; }
  .modal p  { color: var(--muted); font-size: 12px; margin-bottom: 14px; line-height: 1.6; }
  .modal input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px;
    margin-bottom: 12px; outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  .btn-cancel { background: var(--tag-bg); color: var(--muted); }
  .btn-save   { background: var(--accent); color: #fff; }

  .empty  { text-align: center; color: var(--muted); padding: 64px; }
  #status { text-align: center; color: var(--muted); padding: 64px; }
</style>
</head>
<body>

<!-- ── 配置 ── -->
<script>
const GALLERY_REPO   = 'ashjo42/game-gallery';
const GALLERY_BRANCH = 'main';
const MANIFEST_URL   = `https://raw.githubusercontent.com/${GALLERY_REPO}/${GALLERY_BRANCH}/manifest.json`;
</script>

<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="2">
    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
  </svg>
  <h1>Art Gallery</h1>
  <span id="updated"></span>
  <button id="api-btn" onclick="openApiModal()">⚡ 生成 API</button>
</header>

<main>
  <div id="status">加载中…</div>
  <div id="feed"></div>
</main>

<!-- 图片放大 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <div id="lightbox-content"></div>
</div>

<!-- API 配置弹窗 -->
<div class="modal-overlay" id="api-modal">
  <div class="modal">
    <h3>生成 API 地址</h3>
    <p>本地服务器通过 Cloudflare Tunnel / ngrok 等暴露的地址。<br>留空表示仅查看。</p>
    <input id="api-input" type="text" placeholder="https://xxxx.trycloudflare.com">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeApiModal()">取消</button>
      <button class="btn-save"   onclick="saveApi()">保存</button>
    </div>
  </div>
</div>

<script>
const LS_KEY = 'gallery_api_url';

// ── API modal ────────────────────────────────────────────────────
function openApiModal()  { document.getElementById('api-input').value = localStorage.getItem(LS_KEY) || ''; document.getElementById('api-modal').classList.add('open'); }
function closeApiModal() { document.getElementById('api-modal').classList.remove('open'); }
function saveApi() {
  const v = document.getElementById('api-input').value.trim();
  v ? localStorage.setItem(LS_KEY, v) : localStorage.removeItem(LS_KEY);
  document.getElementById('api-btn').classList.toggle('on', !!v);
  closeApiModal();
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(url, isVideo) {
  const c = document.getElementById('lightbox-content');
  c.innerHTML = '';
  if (isVideo) {
    const v = document.createElement('video');
    v.src = url; v.controls = true; v.autoplay = true; v.loop = true;
    c.appendChild(v);
  } else {
    const img = document.createElement('img'); img.src = url;
    c.appendChild(img);
  }
  document.getElementById('lightbox').classList.add('open');
  event.stopPropagation();
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── 渲染 ──────────────────────────────────────────────────────────
function fmt(iso) {
  return new Date(iso).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function makeMediaItem(url, index, isVideo) {
  const wrap = document.createElement('div');
  wrap.className = 'media-item';

  if (isVideo) {
    const v = document.createElement('video');
    v.src = url; v.muted = true; v.autoplay = true; v.loop = true; v.playsInline = true;
    v.addEventListener('click', () => openLightbox(url, true));
    wrap.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = url; img.loading = 'lazy';
    img.addEventListener('click', () => openLightbox(url, false));
    wrap.appendChild(img);
  }

  if (index > 0) {
    const idx = document.createElement('span');
    idx.className = 'media-index'; idx.textContent = `#${index}`;
    wrap.appendChild(idx);
  }
  return wrap;
}

function renderTask(task) {
  const isVideo = task.type === 'video';
  const urls    = (task.urls || []).filter(Boolean);
  if (!urls.length) return null;

  const card = document.createElement('div');
  card.className = 'task-card';

  const hdr = document.createElement('div');
  hdr.className = 'task-header';
  hdr.innerHTML = `
    <span class="badge ${task.type}">${task.type}</span>
    <span class="task-label">${task.label || '—'}</span>
    <span class="task-id">${task.task_id.slice(0, 8)}…</span>
    <span class="task-time">${task.created_at ? fmt(task.created_at) : ''}</span>
  `;
  card.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'media-grid';
  urls.forEach((url, i) => grid.appendChild(makeMediaItem(url, i, isVideo)));
  card.appendChild(grid);

  return card;
}

async function load() {
  const status = document.getElementById('status');
  const feed   = document.getElementById('feed');
  try {
    const res = await fetch(MANIFEST_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const tasks = [...(data.tasks || [])].reverse(); // 最新的在最上面
    document.getElementById('updated').textContent = data.updated_at ? '更新于 ' + fmt(data.updated_at) : '';
    status.style.display = 'none';

    if (!tasks.length) {
      feed.innerHTML = '<div class="empty">暂无生成记录</div>';
      return;
    }
    tasks.forEach(t => {
      const card = renderTask(t);
      if (card) feed.appendChild(card);
    });
  } catch(e) {
    status.textContent = '加载失败：' + e.message;
  }
}

document.getElementById('api-btn').classList.toggle('on', !!localStorage.getItem(LS_KEY));
load();
</script>
</body>
</html>
