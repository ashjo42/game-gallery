<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Art Gallery</title>
<style>
  :root {
    --bg:      #0f1117;
    --surface: #1a1d27;
    --border:  #2a2d3a;
    --accent:  #7c6af7;
    --text:    #e2e4ef;
    --muted:   #6b7094;
    --tag-bg:  #252838;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  #updated  { margin-left: auto; color: var(--muted); font-size: 12px; }
  #api-btn  {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer;
  }
  #api-btn.on { border-color: var(--accent); color: var(--accent); }

  main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* Task cards */
  .task-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 16px; overflow: hidden;
  }
  .task-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .task-label { font-size: 14px; font-weight: 500; }
  .badge {
    padding: 2px 8px; border-radius: 4px; font-size: 11px;
    background: var(--tag-bg); color: var(--muted); text-transform: uppercase;
  }
  .badge.image { color: #81c784; }
  .badge.video { color: #64b5f6; }
  .task-id  { color: var(--muted); font-size: 11px; font-family: monospace; }
  .task-time { margin-left: auto; color: var(--muted); font-size: 11px; }

  /* Media grid */
  .media-grid {
    display: flex; gap: 12px; padding: 14px;
    flex-wrap: wrap; align-items: flex-start;
  }
  .media-item { position: relative; }
  .media-item img,
  .media-item video {
    display: block; border-radius: 6px;
    background: var(--tag-bg); border: 1px solid var(--border);
    max-height: 240px; max-width: 240px;
    object-fit: contain; cursor: pointer;
  }
  .media-item video:hover { border-color: var(--accent); }
  .media-index {
    position: absolute; top: 5px; left: 5px;
    background: rgba(0,0,0,.6); color: #fff;
    font-size: 10px; padding: 1px 5px; border-radius: 3px;
  }

  /* Modal overlay for lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 100; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox img, .lightbox video { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
  .lightbox-close { position: fixed; top: 16px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; line-height: 1; }

  /* API modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 400px; max-width: 90vw; }
  .modal h3 { font-size: 14px; margin-bottom: 8px; }
  .modal p  { color: var(--muted); font-size: 12px; margin-bottom: 14px; line-height: 1.6; }
  .modal input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px;
    margin-bottom: 12px; outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  .btn-cancel { background: var(--tag-bg); color: var(--muted); }
  .btn-save   { background: var(--accent); color: #fff; }

  .empty  { text-align: center; color: var(--muted); padding: 64px; }
  #status { text-align: center; color: var(--muted); padding: 64px; }

  /* ── Generation drawer ── */
  #gen-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  #gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #gen-drawer {
    display: none; position: fixed; top: 0; right: 0; height: 100vh;
    width: 360px; background: var(--surface); border-left: 1px solid var(--border);
    z-index: 50; flex-direction: column; overflow-y: auto;
  }
  #gen-drawer.open { display: flex; }
  .drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid var(--border);
    font-size: 14px; font-weight: 600;
  }
  .drawer-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
  .drawer-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .drawer-tab {
    flex: 1; padding: 10px; text-align: center; font-size: 13px;
    cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
    background: none; border-top: none; border-left: none; border-right: none;
  }
  .drawer-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .drawer-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .form-group textarea, .form-group input[type=text] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
    padding: 8px 10px; outline: none; resize: vertical;
  }
  .form-group textarea:focus, .form-group input[type=text]:focus { border-color: var(--accent); }
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-group label {
    display: flex; align-items: center; gap: 4px; cursor: pointer;
    font-size: 12px; color: var(--text); margin-bottom: 0;
  }
  select.gen-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none;
  }
  .stepper { display: flex; align-items: center; gap: 8px; }
  .stepper button {
    width: 28px; height: 28px; border: 1px solid var(--border);
    border-radius: 4px; background: var(--tag-bg); color: var(--text);
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  }
  .stepper span { min-width: 24px; text-align: center; font-size: 13px; }
  .upload-zone {
    border: 1px dashed var(--border); border-radius: 6px; padding: 20px;
    text-align: center; cursor: pointer; color: var(--muted); font-size: 12px;
    position: relative;
  }
  .upload-zone.has-file { border-color: var(--accent); color: var(--accent); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #gen-submit {
    width: 100%; background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 4px;
  }
  #gen-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  #gen-status { font-size: 12px; color: var(--muted); text-align: center; min-height: 18px; margin-top: 8px; }
</style>
</head>
<body>

<!-- ── 配置 ── -->
<script>
const GALLERY_REPO   = 'ashjo42/game-gallery';
const GALLERY_BRANCH = 'main';
const MANIFEST_URL   = `https://raw.githubusercontent.com/${GALLERY_REPO}/${GALLERY_BRANCH}/manifest.json`;
</script>

<header>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7c6af7" stroke-width="2">
    <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
  </svg>
  <h1>Art Gallery</h1>
  <span id="updated"></span>
  <button id="api-btn" onclick="openApiModal()">⚡ 生成 API</button>
  <button id="gen-btn" onclick="openDrawer()" disabled title="加载配置中…">✨ 生成</button>
</header>

<main>
  <div id="status">加载中…</div>
  <div id="feed"></div>
</main>

<!-- 图片放大 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close">✕</span>
  <div id="lightbox-content"></div>
</div>

<!-- ── 生成抽屉 ── -->
<div id="gen-drawer">
  <div class="drawer-header">
    <span>✨ 生成</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-tabs">
    <button class="drawer-tab active" onclick="switchTab('image')">图片</button>
    <button class="drawer-tab"        onclick="switchTab('video')">视频</button>
  </div>

  <!-- 图片 Tab -->
  <div id="tab-image" class="drawer-body">
    <div class="form-group">
      <label>参考图（可选）</label>
      <div class="upload-zone" id="img-ref-zone">
        <input type="file" id="img-ref-file" accept="image/*" onchange="onRefFileChange('img')">
        <span id="img-ref-label">+ 选择参考图</span>
      </div>
    </div>
    <div class="form-group">
      <label>创意描述</label>
      <textarea id="img-prompt" rows="4" placeholder="请描述您想生成的图片内容"></textarea>
    </div>
    <div class="form-group">
      <label>负向描述（可选）</label>
      <textarea id="img-neg-prompt" rows="2" placeholder="如：模糊、变形、多余肢体"></textarea>
    </div>
    <div class="form-group">
      <label>模型</label>
      <select class="gen-select" id="img-model">
        <option value="gpt-image-1.5">GPT Image 1.5</option>
        <option value="nano_banana_pro">Nano Banana Pro</option>
      </select>
    </div>
    <div class="form-group">
      <label>比例</label>
      <div class="radio-group">
        <label><input type="radio" name="img-ratio" value="auto" checked> 自动</label>
        <label><input type="radio" name="img-ratio" value="1:1"> 1:1</label>
        <label><input type="radio" name="img-ratio" value="9:16"> 9:16</label>
        <label><input type="radio" name="img-ratio" value="16:9"> 16:9</label>
        <label><input type="radio" name="img-ratio" value="3:4"> 3:4</label>
        <label><input type="radio" name="img-ratio" value="4:3"> 4:3</label>
      </div>
    </div>
    <div class="form-group">
      <label>分辨率</label>
      <div class="radio-group">
        <label><input type="radio" name="img-res" value="1K" checked> 1K</label>
        <label><input type="radio" name="img-res" value="2K"> 2K</label>
        <label><input type="radio" name="img-res" value="4K"> 4K</label>
      </div>
    </div>
    <div class="form-group">
      <label>数量</label>
      <div class="stepper">
        <button onclick="stepCount(-1)">−</button>
        <span id="img-count-val">1</span>
        <button onclick="stepCount(+1)">+</button>
      </div>
    </div>
    <div class="form-group">
      <label>标签（可选）</label>
      <input type="text" id="img-label" placeholder="如：狼王 立绘">
    </div>
  </div>

  <!-- 视频 Tab -->
  <div id="tab-video" class="drawer-body" style="display:none">
    <div class="form-group">
      <label>参考素材（可选）</label>
      <div class="upload-zone" id="vid-ref-zone">
        <input type="file" id="vid-ref-file" accept="image/*" onchange="onRefFileChange('vid')">
        <span id="vid-ref-label">+ 选择参考图</span>
      </div>
    </div>
    <div class="form-group">
      <label>创意描述</label>
      <textarea id="vid-prompt" rows="4" placeholder="请描述您想生成的视频内容"></textarea>
    </div>
    <div class="form-group">
      <label>模型</label>
      <select class="gen-select" id="vid-model">
        <option value="doubao-seedance-2-0-fast-260128">Seedance 2.0 Fast</option>
      </select>
    </div>
    <div class="form-group">
      <label>比例</label>
      <div class="radio-group">
        <label><input type="radio" name="vid-ratio" value="1:1" checked> 1:1</label>
        <label><input type="radio" name="vid-ratio" value="16:9"> 16:9</label>
        <label><input type="radio" name="vid-ratio" value="9:16"> 9:16</label>
      </div>
    </div>
    <div class="form-group">
      <label>分辨率</label>
      <div class="radio-group">
        <label><input type="radio" name="vid-res" value="720p" checked> 720p</label>
        <label><input type="radio" name="vid-res" value="1080p"> 1080p</label>
      </div>
    </div>
    <div class="form-group">
      <label>数量</label>
      <div class="radio-group">
        <label><input type="radio" name="vid-count" value="1" checked> 1条</label>
        <label><input type="radio" name="vid-count" value="2"> 2条</label>
        <label><input type="radio" name="vid-count" value="4"> 4条</label>
      </div>
    </div>
    <div class="form-group">
      <label>标签（可选）</label>
      <input type="text" id="vid-label" placeholder="如：狼王 idle">
    </div>
  </div>

  <div style="padding: 0 18px 18px">
    <button id="gen-submit" onclick="submitGeneration()">✨ 立刻生成</button>
    <div id="gen-status"></div>
  </div>
</div>

<!-- API 配置弹窗 -->
<div class="modal-overlay" id="api-modal">
  <div class="modal">
    <h3>生成 API 地址</h3>
    <p>本地服务器通过 Cloudflare Tunnel / ngrok 等暴露的地址。<br>留空表示仅查看。</p>
    <input id="api-input" type="text" placeholder="https://xxxx.trycloudflare.com">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeApiModal()">取消</button>
      <button class="btn-save"   onclick="saveApi()">保存</button>
    </div>
  </div>
</div>

<script>
const LS_KEY = 'gallery_api_url';

// ── API modal ────────────────────────────────────────────────────
function openApiModal()  { document.getElementById('api-input').value = localStorage.getItem(LS_KEY) || ''; document.getElementById('api-modal').classList.add('open'); }
function closeApiModal() { document.getElementById('api-modal').classList.remove('open'); }
function saveApi() {
  const v = document.getElementById('api-input').value.trim();
  v ? localStorage.setItem(LS_KEY, v) : localStorage.removeItem(LS_KEY);
  document.getElementById('api-btn').classList.toggle('on', !!v);
  closeApiModal();
}

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(url, isVideo) {
  const c = document.getElementById('lightbox-content');
  c.innerHTML = '';
  if (isVideo) {
    const v = document.createElement('video');
    v.src = url; v.controls = true; v.autoplay = true; v.loop = true;
    c.appendChild(v);
  } else {
    const img = document.createElement('img'); img.src = url;
    c.appendChild(img);
  }
  document.getElementById('lightbox').classList.add('open');
  event.stopPropagation();
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ── 渲染 ──────────────────────────────────────────────────────────
function fmt(iso) {
  return new Date(iso).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function makeMediaItem(url, index, isVideo) {
  const wrap = document.createElement('div');
  wrap.className = 'media-item';

  if (isVideo) {
    const v = document.createElement('video');
    v.src = url; v.muted = true; v.autoplay = true; v.loop = true; v.playsInline = true;
    v.addEventListener('click', () => openLightbox(url, true));
    wrap.appendChild(v);
  } else {
    const img = document.createElement('img');
    img.src = url; img.loading = 'lazy';
    img.addEventListener('click', () => openLightbox(url, false));
    wrap.appendChild(img);
  }

  if (index > 0) {
    const idx = document.createElement('span');
    idx.className = 'media-index'; idx.textContent = `#${index}`;
    wrap.appendChild(idx);
  }
  return wrap;
}

function renderTask(task) {
  const isVideo = task.type === 'video';
  const urls    = (task.urls || []).filter(Boolean);
  if (!urls.length) return null;

  const card = document.createElement('div');
  card.className = 'task-card';

  const hdr = document.createElement('div');
  hdr.className = 'task-header';
  hdr.innerHTML = `
    <span class="badge ${task.type}">${task.type}</span>
    <span class="task-label">${task.label || '—'}</span>
    <span class="task-id">${task.task_id.slice(0, 8)}…</span>
    <span class="task-time">${task.created_at ? fmt(task.created_at) : ''}</span>
  `;
  card.appendChild(hdr);

  const grid = document.createElement('div');
  grid.className = 'media-grid';
  urls.forEach((url, i) => grid.appendChild(makeMediaItem(url, i, isVideo)));
  card.appendChild(grid);

  return card;
}

async function load() {
  const status = document.getElementById('status');
  const feed   = document.getElementById('feed');
  try {
    const res = await fetch(MANIFEST_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const tasks = [...(data.tasks || [])].reverse(); // 最新的在最上面
    document.getElementById('updated').textContent = data.updated_at ? '更新于 ' + fmt(data.updated_at) : '';
    // Configure generation endpoints from manifest meta
    const meta = data.meta || {};
    GEN_WEBHOOK = meta.feishu_webhook || '';
    GEN_UPLOAD  = meta.upload_url     || '';
    const genBtn = document.getElementById('gen-btn');
    genBtn.disabled = !GEN_WEBHOOK;
    genBtn.title    = GEN_WEBHOOK ? '点击打开生成面板' : '未配置 Feishu webhook（运行 upload.py 更新 manifest）';
    if (!GEN_UPLOAD) {
      document.querySelectorAll('.upload-zone').forEach(z => {
        z.style.opacity = '0.4';
        z.style.pointerEvents = 'none';
        z.querySelector('span').textContent = '未配置上传地址';
      });
    }
    status.style.display = 'none';

    if (!tasks.length) {
      feed.innerHTML = '<div class="empty">暂无生成记录</div>';
      return;
    }
    tasks.forEach(t => {
      const card = renderTask(t);
      if (card) feed.appendChild(card);
    });
  } catch(e) {
    status.textContent = '加载失败：' + e.message;
  }
}

// ── Generation state ──────────────────────────────────────────────────────────
let GEN_WEBHOOK = '';
let GEN_UPLOAD  = '';
let _imgCount   = 1;
const _tempIds  = {};   // { img: 'uuid', vid: 'uuid' }

function openDrawer()  { document.getElementById('gen-drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('gen-drawer').classList.remove('open'); }

function switchTab(tab) {
  document.querySelectorAll('.drawer-tab').forEach((el, i) =>
    el.classList.toggle('active', (i === 0) === (tab === 'image')));
  document.getElementById('tab-image').style.display = tab === 'image' ? 'flex' : 'none';
  document.getElementById('tab-video').style.display = tab === 'video' ? 'flex' : 'none';
}

function stepCount(delta) {
  _imgCount = Math.max(1, Math.min(4, _imgCount + delta));
  document.getElementById('img-count-val').textContent = _imgCount;
}

function onRefFileChange(prefix) {
  const file = document.getElementById(`${prefix}-ref-file`).files[0];
  if (!file) return;
  document.getElementById(`${prefix}-ref-label`).textContent = file.name;
  document.getElementById(`${prefix}-ref-zone`).classList.add('has-file');
  if (!GEN_UPLOAD) { setStatus('未配置上传地址，参考图无法上传'); return; }
  const fd = new FormData();
  fd.append('file', file);
  setStatus('⏳ 上传参考图…');
  fetch(`${GEN_UPLOAD}/upload`, { method: 'POST', body: fd })
    .then(r => r.json())
    .then(d => { _tempIds[prefix] = d.temp_id; setStatus(''); })
    .catch(e => setStatus('参考图上传失败：' + e.message));
}

function setStatus(msg) {
  document.getElementById('gen-status').textContent = msg;
}

function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

async function submitGeneration() {
  if (!GEN_WEBHOOK) { setStatus('未配置 Feishu webhook，无法生成'); return; }
  const isImage = document.getElementById('tab-image').style.display !== 'none';
  let payload;
  if (isImage) {
    const ratio = getRadio('img-ratio');
    payload = {
      type:            'image',
      model:           document.getElementById('img-model').value,
      prompt:          document.getElementById('img-prompt').value.trim(),
      label:           document.getElementById('img-label').value.trim(),
      ratio:           ratio === 'auto' ? null : ratio,
      resolution:      getRadio('img-res'),
      count:           _imgCount,
      negative_prompt: document.getElementById('img-neg-prompt').value.trim() || null,
      temp_id:         _tempIds['img'] || null,
    };
  } else {
    payload = {
      type:       'video',
      model:      document.getElementById('vid-model').value,
      prompt:     document.getElementById('vid-prompt').value.trim(),
      label:      document.getElementById('vid-label').value.trim(),
      ratio:      getRadio('vid-ratio'),
      resolution: getRadio('vid-res'),
      count:      parseInt(getRadio('vid-count') || '1', 10),
      temp_id:    _tempIds['vid'] || null,
    };
  }
  if (!payload.prompt) { setStatus('请输入创意描述'); return; }
  const btn = document.getElementById('gen-submit');
  btn.disabled = true;
  setStatus('⏳ 发送请求…');
  try {
    await fetch(GEN_WEBHOOK, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ msg_type: 'text', content: { text: JSON.stringify(payload) } }),
    });
    setStatus('✅ 已发送到飞书群，Gallery 生成完成后自动更新');
  } catch (e) {
    setStatus('❌ 发送失败：' + e.message);
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('api-btn').classList.toggle('on', !!localStorage.getItem(LS_KEY));
load();
</script>
